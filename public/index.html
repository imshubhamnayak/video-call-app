<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        video {
            background: #1e293b;
            border-radius: 1rem;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-container {
            position: relative;
            aspect-ratio: 16/9;
        }
        .user-name {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- Join Screen -->
    <div id="join-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-md border border-slate-700">
            <h1 class="text-3xl font-bold mb-2 text-center">Video Call</h1>
            <p class="text-slate-400 text-center mb-8">Join or create a room</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Your Name</label>
                    <input id="user-name" type="text" placeholder="Enter your name"
                           class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Room ID</label>
                    <input id="room-id" type="text" placeholder="e.g. friends-123"
                           class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-orange-500">
                </div>
                <button onclick="joinRoom()" 
                        class="w-full py-3 bg-orange-600 hover:bg-orange-500 rounded-xl font-medium mt-2">
                    Join Room
                </button>
            </div>
        </div>
    </div>

    <!-- Call Screen (hidden initially) -->
    <div id="call-screen" class="hidden min-h-screen flex flex-col">
        <!-- Header -->
        <div class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
            <div>
                <h2 class="font-semibold text-lg">Room: <span id="current-room" class="text-orange-400"></span></h2>
                <p class="text-sm text-slate-400">You: <span id="current-user"></span></p>
            </div>
            <button onclick="leaveRoom()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-xl text-sm">
                Leave
            </button>
        </div>

        <!-- Videos Grid -->
        <div id="videos" class="flex-1 p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 overflow-auto">
            <!-- Local video will be added here -->
        </div>

        <!-- Controls -->
        <div class="bg-slate-900 border-t border-slate-800 px-6 py-4 flex items-center justify-center gap-4">
            <button id="mute-btn" onclick="toggleMute()" 
                    class="w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center">
                🎤
            </button>
            <button id="camera-btn" onclick="toggleCamera()" 
                    class="w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center">
                📷
            </button>
        </div>
    </div>

    <!-- Socket.IO client is automatically served by the server at this path -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
