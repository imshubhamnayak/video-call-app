<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        video {
            background: #1e293b;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #videos {
            position: relative;
            background: #0f172a;
        }

        /* Remote videos - main area */
        .video-container.remote {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            background: #1e293b;
            width: 100%;
            height: 100%;
        }

        /* Local video - WhatsApp style PiP overlay (portrait) */
        .video-container.local {
            position: absolute;
            bottom: 100px;
            right: 16px;
            width: 110px;
            height: 160px; /* portrait ratio */
            z-index: 30;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #1e293b;
        }

        .user-name {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 0.7rem;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Layout modes */
        #videos.one-remote {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videos.one-remote .video-container.remote {
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 9/16; /* prefer portrait */
            height: auto;
            width: auto;
        }

        #videos.multiple {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            padding: 8px;
            align-content: center;
        }

        #videos.multiple .video-container.remote {
            aspect-ratio: 9/16;
            height: auto;
        }

        /* On larger screens keep a bit more space */
        @media (min-width: 768px) {
            .video-container.local {
                width: 140px;
                height: 200px;
                bottom: 110px;
                right: 24px;
            }
            #videos.multiple {
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 12px;
                padding: 12px;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- Join Screen -->
    <div id="join-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-md border border-slate-700">
            <h1 class="text-3xl font-bold mb-2 text-center">Video Call</h1>
            <p class="text-slate-400 text-center mb-8">Join or create a room</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Your Name</label>
                    <input id="user-name" type="text" placeholder="Enter your name"
                           class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Room ID</label>
                    <input id="room-id" type="text" placeholder="e.g. friends-123"
                           class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-orange-500">
                </div>
                <button onclick="joinRoom()" 
                        class="w-full py-3 bg-orange-600 hover:bg-orange-500 rounded-xl font-medium mt-2">
                    Join Room
                </button>
            </div>
        </div>
    </div>

    <!-- Call Screen (hidden initially) -->
    <div id="call-screen" class="hidden min-h-screen flex flex-col">
        <!-- Header -->
        <div class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
            <div>
                <h2 class="font-semibold text-lg">Room: <span id="current-room" class="text-orange-400"></span></h2>
                <p class="text-sm text-slate-400">You: <span id="current-user"></span></p>
            </div>
            <button onclick="leaveRoom()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-xl text-sm">
                Leave
            </button>
        </div>

        <!-- Videos area -->
        <div id="videos" class="flex-1 overflow-hidden relative">
            <!-- Videos will be added here by JS -->
        </div>

        <!-- Controls -->
        <div class="bg-slate-900 border-t border-slate-800 px-6 py-4 flex items-center justify-center gap-4">
            <button id="mute-btn" onclick="toggleMute()" 
                    class="w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center">
                🎤
            </button>
            <button id="camera-btn" onclick="toggleCamera()" 
                    class="w-14 h-14 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center">
                📷
            </button>
        </div>
    </div>

    <!-- Socket.IO client is automatically served by the server at this path -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
